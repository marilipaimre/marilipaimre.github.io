<script>
// =========================
// TV ELEMENTS
// =========================
const tv = document.getElementById('tv-wrapper');

const nose = document.getElementById('_x3C_Nina_x3E_');

const plusBtn = document.getElementById('_x3C_Heli_valjendav_nupp_x3E_');

const minusBtn = document.getElementById('_x3C_Heli_vaigistav_nupp_x3E_');

const screenOff = document.getElementById('screen-off');

const volHud = document.getElementById('vol-hud');

const volBar = document.getElementById('vol-bar');

const volNum = document.getElementById('vol-num');

const video = document.getElementById('tv-video');


// =========================
// TV STATE
// =========================
let isTvOn = true;

let volume = 60;

let hudTimer;

video.volume = volume / 100;

video.muted = false;


// =========================
// POWER FUNCTION
// =========================
function setTvState(on) {

  isTvOn = on;

  if (isTvOn) {

    // TV ON
    screenOff.style.opacity = '0';

    screenOff.style.background = 'transparent';

    video.style.display = 'block';

    video.muted = false;

    video.play().catch(() => {});

  } else {

    // TV OFF
    screenOff.style.opacity = '1';

    screenOff.style.background = 'black';

    video.muted = true;

    video.pause();

    video.style.display = 'none';
  }
}


// =========================
// DRAGGING
// =========================
let drag = false;

let ox, oy;

tv.addEventListener('mousedown', e => {

  if (
    e.target.closest('#_x3C_Nina_x3E_') ||
    e.target.closest('#_x3C_Heli_valjendav_nupp_x3E_') ||
    e.target.closest('#_x3C_Heli_vaigistav_nupp_x3E_')
  ) return;

  drag = true;

  const r = tv.getBoundingClientRect();

  ox = e.clientX - r.left;

  oy = e.clientY - r.top;

  e.preventDefault();
});

document.addEventListener('mousemove', e => {

  if (!drag) return;

  tv.style.left = (e.clientX - ox) + 'px';

  tv.style.top = (e.clientY - oy) + 'px';

  tv.style.transform = 'none';
});

document.addEventListener('mouseup', () => {
  drag = false;
});


// =========================
// BUTTON PRESS EFFECT
// =========================
function press(el) {

  el.classList.add('pressed');

  setTimeout(() => {
    el.classList.remove('pressed');
  }, 80);
}


// =========================
// POWER BUTTON
// =========================
nose.addEventListener('mousedown', e => {

  e.stopPropagation();

  press(nose);

  setTvState(!isTvOn);
});


// =========================
// VOLUME FUNCTION
// =========================
function updateVol(delta, el, e) {

  e.stopPropagation();

  press(el);

  volume = Math.max(0, Math.min(100, volume + delta));

  video.volume = volume / 100;

  video.muted = !isTvOn || volume === 0;

  volBar.style.width = volume + '%';

  volNum.textContent = volume;

  volHud.classList.add('show');

  clearTimeout(hudTimer);

  hudTimer = setTimeout(() => {
    volHud.classList.remove('show');
  }, 1500);
}


// =========================
// VOLUME +
// =========================
plusBtn.addEventListener('mousedown', e => {

  updateVol(10, plusBtn, e);
});


// =========================
// VOLUME -
// =========================
minusBtn.addEventListener('mousedown', e => {

  updateVol(-10, minusBtn, e);
});


// =========================
// START STATE
// =========================
setTvState(true);

</script>
